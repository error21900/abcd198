workflows:
  android-release:
    name: Bybit Bot Android Release
    environment:
      flutter: stable
    scripts:
      - name: Automatic Network Setup and Permissions
        script: |
          # 1. Generate core android folders automatically
          flutter create --platforms=android .

          # 2. Inject network security configuration file to allow Bybit demo connections
          mkdir -p android/app/src/main/res/xml
          cat << 'EOF' > android/app/src/main/res/xml/network_security_config.xml
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                      <certificates src="user" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">api-demo.bybit.com</domain>
                  <domain includeSubdomains="true">api.bybit.com</domain>
              </domain-config>
          </network-security-config>
          EOF

          # 3. Inject AndroidManifest file (FIXED: Removed missing roundIcon requirement)
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <application
                  android:label="Saad Trading Bot"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF
      - name: Compile Application
        script: |
          flutter pub get
          flutter build apk --release --enable-experiment=dot-shorthands
    artifacts:
      - build/app/outputs/**/*.apk
